name: Daily Dashboard Update

on:
  schedule:
    - cron: '30 1 * * *'  # 매일 오전 10시 30분 KST
  workflow_dispatch:       # 수동 실행 버튼도 생김

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install arxiv requests wordcloud matplotlib   # ← 추가

      - name: 한글 폰트 설치                                  # ← 추가
        run: sudo apt-get install -y fonts-nanum

      - name: 데이터 폴더 생성
        run: mkdir -p data assets/images                      # ← assets/images 추가

      - name: 가격 데이터 업데이트
        run: python scripts/fetch_prices.py

      - name: 논문 수집
        run: python scripts/fetch_papers.py

      - name: 특허 수집
        run: python scripts/fetch_patents.py
        env:
          KIPRIS_API_KEY: ${{ secrets.KIPRIS_API_KEY }}

      - name: 뉴스 수집
        run: python scripts/fetch_news.py

      - name: 워드클라우드 생성                               # ← 추가
        run: python scripts/generate_wordcloud.py

      - name: 알림 메일 발송
        run: python scripts/send_notify.py
        env:
          GMAIL_USER:   ${{ secrets.GMAIL_USER }}
          GMAIL_PASS:   ${{ secrets.GMAIL_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          NOTIFY_CC:    ${{ secrets.NOTIFY_CC }}

      - name: 변경사항 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ assets/                               # ← assets/ 추가
          git diff --staged --quiet || git commit -m "📊 자동 업데이트: $(date '+%Y-%m-%d')"
          git pull --rebase origin main
          git push origin main
